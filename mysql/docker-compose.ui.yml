services:
  mysql:
    image: mysql:8.0
    container_name: oneqit_mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: dev
    volumes:
      - oneqit-mysql-data:/var/lib/mysql
    networks:
      - network_oneqit
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: oneqit_phpmyadmin
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
    depends_on:
      - mysql
    networks:
      - network_oneqit
    restart: unless-stopped

volumes:
  oneqit-mysql-data:

networks:
  network_oneqit:
    driver: bridge
